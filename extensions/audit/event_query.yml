---
# extensions/audit/event_query.yml
# Maps DDN EXAScaler module return values to the AAP Normalized Resource Taxonomy.
# Return key is the resource type dict (e.g. filesystem, volume, storage_pool).
# Each dict contains "id" and "name" fields from the DDN REST API.

stevefulme1.ddn.ddn_filesystem:
  query: >-
    {
      name: .filesystem.name,
      canonical_facts: {
        uuid: .filesystem.id
      },
      facts: {
        device_type: "file_storage"
      }
    }

stevefulme1.ddn.ddn_volume:
  query: >-
    {
      name: .volume.name,
      canonical_facts: {
        uuid: .volume.id
      },
      facts: {
        device_type: "file_storage"
      }
    }

