---
# Integration tests for stevefulme1.ddn.ddn_mgs

- name: List ddn_mgs resources
  stevefulme1.ddn.ddn_mgs_info:
    host: "{{ ddn_host | default('localhost') }}"
    username: "{{ ddn_username | default('admin') }}"
    password: "{{ ddn_password | default('password') }}"
    validate_certs: "{{ ddn_validate_certs | default(false) }}"
  register: list_result

- name: Verify ddn_mgs listing
  ansible.builtin.assert:
    that:
      - list_result is not failed

- name: Create ddn_mgs (check_mode)
  stevefulme1.ddn.ddn_mgs:
    host: "{{ ddn_host | default('localhost') }}"
    username: "{{ ddn_username | default('admin') }}"
    password: "{{ ddn_password | default('password') }}"
    validate_certs: "{{ ddn_validate_certs | default(false) }}"
    name: "ansible-test-{{ resource_prefix }}"
    state: present
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Create ddn_mgs
  stevefulme1.ddn.ddn_mgs:
    host: "{{ ddn_host | default('localhost') }}"
    username: "{{ ddn_username | default('admin') }}"
    password: "{{ ddn_password | default('password') }}"
    validate_certs: "{{ ddn_validate_certs | default(false) }}"
    name: "ansible-test-{{ resource_prefix }}"
    state: present
  register: create_result

- name: Verify ddn_mgs was created
  ansible.builtin.assert:
    that:
      - create_result is changed

- name: Create ddn_mgs again (idempotency)
  stevefulme1.ddn.ddn_mgs:
    host: "{{ ddn_host | default('localhost') }}"
    username: "{{ ddn_username | default('admin') }}"
    password: "{{ ddn_password | default('password') }}"
    validate_certs: "{{ ddn_validate_certs | default(false) }}"
    name: "ansible-test-{{ resource_prefix }}"
    state: present
  register: idem_result

- name: Verify idempotent create
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete ddn_mgs (check_mode)
  stevefulme1.ddn.ddn_mgs:
    host: "{{ ddn_host | default('localhost') }}"
    username: "{{ ddn_username | default('admin') }}"
    password: "{{ ddn_password | default('password') }}"
    validate_certs: "{{ ddn_validate_certs | default(false) }}"
    name: "ansible-test-{{ resource_prefix }}"
    state: absent
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Delete ddn_mgs
  stevefulme1.ddn.ddn_mgs:
    host: "{{ ddn_host | default('localhost') }}"
    username: "{{ ddn_username | default('admin') }}"
    password: "{{ ddn_password | default('password') }}"
    validate_certs: "{{ ddn_validate_certs | default(false) }}"
    name: "ansible-test-{{ resource_prefix }}"
    state: absent
  register: delete_result

- name: Verify ddn_mgs was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete ddn_mgs again (idempotent)
  stevefulme1.ddn.ddn_mgs:
    host: "{{ ddn_host | default('localhost') }}"
    username: "{{ ddn_username | default('admin') }}"
    password: "{{ ddn_password | default('password') }}"
    validate_certs: "{{ ddn_validate_certs | default(false) }}"
