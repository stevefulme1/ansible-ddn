---
argument_specs:
  main:
    short_description: "Add OSTs and storage to existing filesystem"
    options:
      ddn_capacity_expansion_host:
        description: Target host address
        type: str
        required: true
      ddn_capacity_expansion_username:
        description: Authentication username
        type: str
      ddn_capacity_expansion_password:
        description: Authentication password
        type: str
        no_log: true
      ddn_capacity_expansion_api_key:
        description: API key for authentication
        type: str
        no_log: true
      ddn_capacity_expansion_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      ddn_capacity_expansion_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
