---
argument_specs:
  main:
    short_description: "Configure user and group quotas"
    options:
      ddn_quota_management_host:
        description: Target host address
        type: str
        required: true
      ddn_quota_management_username:
        description: Authentication username
        type: str
      ddn_quota_management_password:
        description: Authentication password
        type: str
      ddn_quota_management_api_key:
        description: API key for authentication
        type: str
      ddn_quota_management_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      ddn_quota_management_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
