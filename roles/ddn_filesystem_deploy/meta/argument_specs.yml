---
argument_specs:
  main:
    short_description: "Deploy Lustre filesystem with OSTs and MDTs"
    options:
      ddn_filesystem_deploy_host:
        description: Target host address
        type: str
        required: true
      ddn_filesystem_deploy_username:
        description: Authentication username
        type: str
      ddn_filesystem_deploy_password:
        description: Authentication password
        type: str
        no_log: true
      ddn_filesystem_deploy_api_key:
        description: API key for authentication
        type: str
        no_log: true
      ddn_filesystem_deploy_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      ddn_filesystem_deploy_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
